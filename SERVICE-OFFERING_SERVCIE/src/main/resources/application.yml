server:
  port: 5004
spring:
  application:
    name: SERVICE-OFFERING_SERVCIE
  
  datasource:
    url: jdbc:mysql://localhost:3306/salon_offering
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    
eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka
