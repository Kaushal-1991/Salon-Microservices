spring.application.name=BOOKING_SERVCIE
server.port=5005

# ===============================
# MySQL Connection (UTC)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/salon_booking?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA Settings
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 🔥 IMPORTANT (same as DB timezone)
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================
# JSON Response Timezone (IST)
# ===============================
spring.jackson.time-zone=Asia/Kolkata

# ===============================
# Logging
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
