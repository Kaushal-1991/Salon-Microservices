server:
  port: 5002

spring:
  application:
    name: SALON-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/salon_salon
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka